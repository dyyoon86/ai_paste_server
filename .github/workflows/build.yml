name: Build installers

# 태그(v*)를 푸시하면 win/mac/linux 설치파일을 빌드해 GitHub Release 에 올린다.
# 수동 실행(workflow_dispatch)도 가능 — 산출물은 Actions 아티팩트로 받는다.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            artifact: "*.exe"
          - os: macos-latest
            target: mac
            artifact: "*.dmg"
          - os: ubuntu-latest
            target: linux
            artifact: "*.AppImage"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package (${{ matrix.target }})
        # next build → electron-builder. publish=never 로 두고 릴리스는 마지막 단계에서.
        run: npm run dist:${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 사내 SSL 인터셉트 대비 (로컬 renderer.ts 와 동일 정책)
          NODE_TLS_REJECT_UNAUTHORIZED: "0"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PasteMotion-${{ matrix.target }}
          path: dist-app/${{ matrix.artifact }}
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-app/${{ matrix.artifact }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
